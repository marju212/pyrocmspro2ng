; PHP-FPM picks this up per-directory (php_admin_value can override).
; Restart PHP-FPM after first deploy or wait up to user_ini.cache_ttl (300s).
;
; Modern phone photos are routinely 4–12 MB; raising upload limits to fit.
upload_max_filesize = 20M
post_max_size = 25M
memory_limit = 256M
max_file_uploads = 20

; Long uploads on slow connections shouldn't time out.
max_input_time = 120

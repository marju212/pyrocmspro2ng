 margin-top: 45px;

{{ if {files:folder_exists slug="[[ url:segments segment='2' ]]"} }} 
    <div id="slider" style="width:100%;height:520px;background-color:white;">
        {{ files:listing folder="produkter/bildvisare943x520/[[ url:segments segment='2' ]]"}  order-by="ordering_count"}} 
            <div class="ls-slide" data-ls="slidedelay:4000; fadein:true;
fadeout:true;">  
                <img src="{{ files:image_url id='{{ id }}'}}" alt="{{ description }}" class="ls-tn"/>
              <img src="{{ files:image_url id='{{ id }}'}}" alt="{{ description }}" class="ls-l"/>
        
            </div>
        {{ /files:listing }}
    </div>
    <script type="text/javascript">        
        $(function() {      
            $('#slider').layerSlider({
                responsive: false,
                responsiveUnder: 960,
                layersContainer: 960,
                skin: 'borderlesslight3d',
                pauseOnHover: true,
                skinsPath: '{{ theme:css_url}}layerslider/skins/',
                autoStart: true,
                firstLayer: 1,
                thumbnailNavigation: 'always',
                navButtons: false,
                navPrevNext: true,
                navStartStop: false,
                showCircleTimer: false,
                tnActiveOpacity: 40,
                tnInactiveOpacity: 100,
                tnContainerWidth: '90%',
                touchNav:true
            });
        });
    </script>
{{ else }}
<h3>Finns inga bilder</h3>
{{ endif }}
